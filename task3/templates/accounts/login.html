{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h1>Connexion</h1>
        <p class="subtitle">Accédez à votre espace de gestion de projet</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Nom d'utilisateur</label>
                <input type="text" name="username" id="id_username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Mot de passe</label>
                <input type="password" name="password" id="id_password" class="form-input" required>
            </div>
            {% if form.errors %}
            <div class="form-error">Identifiants incorrects.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">Se connecter</button>
        </form>
        <p style="text-align:center;margin-top:1.5rem;font-size:.9rem;">
            Pas encore de compte ? <a href="{% url 'accounts:register' %}">S'inscrire</a>
        </p>
    </div>
</div>
{% endblock %}
